<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey QR Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 480px; }
    h1 { color: #003366; margin-bottom: 8px; font-size: 1.3rem; }
    p { color: #555; margin-bottom: 24px; font-size: 0.95rem; }
    img { border-radius: 8px; max-width: 280px; }
    .url { margin-top: 20px; background: #f0f6ff; padding: 12px; border-radius: 8px; font-size: 0.85rem; word-break: break-all; color: #004d99; }
    .print-btn { margin-top: 16px; background: #004d99; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .print-btn:hover { background: #003366; }
    @media print { .print-btn { display: none; } body { background: #fff; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>EM Resident Feedback Survey</h1>
    <p>Scan to open the evaluation form</p>
    <img src="data:image/png;base64,{{ qr_data }}" alt="QR Code">
    <div class="url">{{ url }}</div>
    <button class="print-btn" onclick="window.print()">Print QR Code</button>
  </div>
</body>
</html>
