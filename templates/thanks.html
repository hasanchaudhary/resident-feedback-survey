<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 48px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 480px; }
    .check { font-size: 3rem; margin-bottom: 16px; }
    h1 { color: #004d99; margin-bottom: 8px; }
    p { color: #555; margin-bottom: 24px; }
    a { display: inline-block; background: #004d99; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    a:hover { background: #003366; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Thank You!</h1>
    <p>Your evaluation has been submitted successfully.</p>
    <a href="/">Submit Another Evaluation</a>
  </div>
</body>
</html>
